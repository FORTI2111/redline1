<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Panel Pracownika</title>
    <link rel="stylesheet" href="style.css">
    <script src="panel.js" defer></script>
</head>

<body class="panel-body">

<div class="panel worker">
    <h1>🛠 PANEL PRACOWNIKA</h1>
    <p>Zadania i obsługa warsztatu</p>

    <div class="cards">
        <div class="card">
            <h2>Zlecenia</h2>
            <p>Nowe: 5</p>
        </div>

        <div class="card">
            <h2>Naprawy</h2>
            <p>W toku: 2</p>
        </div>

        <div class="card">
            <button>Dodaj raport</button>
        </div>
    </div>
</div>

</body>
</html>
